<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SIMPLY-DONE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h1 class="text-center">SIMPLY-DONE</h1>
  <p class="text-center">Get your work done on time.</p>

  
  <div class="row g-2 mb-3">
    <div class="col-md-4">
      <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
    </div>

    <div class="col-md-3">
      <select id="priorityInput" class="form-select">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>

    <div class="col-md-3">
      <input type="date" id="deadlineInput" class="form-control">
    </div>

    <div class="col-md-2">
      <button class="btn btn-primary w-100" id="addBtn">Add</button>
    </div>
  </div>

  
  <div class="mb-3">
    <button class="btn btn-outline-primary filter-btn" data-type="all">All</button>
    <button class="btn btn-outline-success filter-btn" data-type="completed">Completed</button>
    <button class="btn btn-outline-warning filter-btn" data-type="pending">Pending</button>
  </div>

  
  <div class="mb-3">
    <button class="btn btn-secondary" id="sortPriority">Sort by Priority</button>
    <button class="btn btn-secondary" id="sortDeadline">Sort by Deadline</button>
  </div>

  
  <div class="mb-3">
    Total: <strong id="totalCount">0</strong> |
    Completed: <strong id="completedCount">0</strong> |
    Pending: <strong id="pendingCount">0</strong>
  </div>

  
  <div id="taskList" class="row"></div>
</div>


<script src="script.js"></script>

</body>
</html>
